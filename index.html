<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Library</title>

    <!-- Links to add the 'Fontdiner Swanky' font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/683de985a5.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="mainContainer">
        <!-- Header -->
        <div class="headerContainer">
            
            <div class="headerLogo">
                <a href="#"><img src="images/booksLibraryLogo.png"></a>
            </div>

            <div class="headerTitle">
                <h1>WELCOME TO YOUR <br> BOOKS NEST</h1>
            </div>

            <div class="headerLinks">
                <ul>
                    <li>
                        <a href="">Your books</a>
                    </li>
                    <li>
                        <a href="#howToUseSection">How to use</a>
                    </li>
                    <li>
                        <a href="https://github.com/Thomas-Attanasio/odin_booksLibrary.git" target="_blank">GitHub repo</a>
                    </li>
                </ul>
            </div>
        </div>

        
        <!-- How to use section -->
        <div class="howToUseContainer" id="howToUseSection">
            <div class="howToUseTitle">
                <h1>How to use?</h1>
            </div>

            <div class="howToUseCards">
                <div class="howToUseCardGroup">
                    <h2>ADD A NEW BOOK</h2>

                    <p>Just press the '+' button</p>
                </div>

                <div class="howToUseCardGroup">
                    <h2>WRITE</h2>

                    <p>Enter all the info</p>
                </div>

                <div class="howToUseCardGroup">
                    <h2>SEE THE MAGIC</h2>

                    <p>Watch your book appear</p>
                </div>
            </div>
        </div>

        <!-- Personal books -->
        <div class="booksContainer">
            <div class="newBookFormContainer" id="newBookFormContainer">
                <form id="newBookForm">
                    <fieldset>
                        <legend>Add a new book</legend>

                        <div class="inputGroup">
                            <label for="title">Title</label>
                            <input type="text" id="title" placeholder="Enter the title" required>
                        </div>

                        <div class="inputGroup">
                            <label for="author">Author</label>
                            <input type="text" id="author" placeholder="Enter the author" required>
                        </div>

                        <div class="inputGroup">
                            <label for="pagesNumber">Pages</label>
                            <input type="number" id="pagesNumber" placeholder="0" min="0" required>
                        </div>

                        <div class="inputGroup radioInput">
                            <p>Have you read it?</p>

                            <input type="radio" id="isRead" name="bookRead" value="Yes">
                            <label for="isRead">Yes</label>

                            <input type="radio" id="isNotRead" name="bookRead" value="No">
                            <label for="isNotRead">No</label>
                        </div>

                        <button type="submit" id="addBookButton">Add</button>
                    </fieldset>
                </form>
            </div>

            <button id="showFormButton"><i class="fas fa-plus"></i></button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    
</body>
</html>
